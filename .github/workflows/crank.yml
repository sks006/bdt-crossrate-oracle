name: Serverless BDT Oracle Crank

on:
  schedule:
    # Trigger execution exactly once per hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Retains manual execution capabilities inside the GitHub dashboard

jobs:
  update-oracle-state:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Runtime Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build System Node Dependencies
        run: npm install

      - name: Execute Oracle Ingestion Pipeline
        env:
          RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          CRANK_PRIVATE_KEY: ${{ secrets.CRANK_PRIVATE_KEY }}
          EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
        run: npx ts-node client/crank.ts
